name: Deploy Security+ Cloud Lab

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  terraform-localstack:
    runs-on: ubuntu-latest

    env:
      TF_VAR_localstack_endpoint: http://localhost:4566

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Start LocalStack
        run: |
          docker run -d             --name localstack             -p 4566:4566             -e SERVICES=s3,ec2,iam,sts             -e DEBUG=1             localstack/localstack:latest

      - name: Wait for LocalStack
        run: |
          echo "Waiting for LocalStack..."
          for i in {1..30}; do
            if curl -s http://localhost:4566/_localstack/health > /dev/null; then
              echo "LocalStack is ready"
              break
            fi
            echo "Waiting..."
            sleep 5
          done

      - name: Display LocalStack Health
        run: |
          curl http://localhost:4566/_localstack/health

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Show LocalStack Logs on Failure
        if: failure()
        run: |
          docker logs localstack
